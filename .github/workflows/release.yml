name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-version-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tag, project version, and PyPI version
        run: python scripts/check_release_version.py

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.8"

      - name: Install project
        run: uv sync --no-dev

      - name: Run pyright
        run: uvx pyright

  sdist:
    runs-on: ubuntu-latest
    needs:
      - release-version-check
      - typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.8"

      - name: Build sdist
        run: uv build --sdist --no-sources

      - name: Check sdist metadata
        run: uvx --from twine twine check dist/*.tar.gz

      - name: Smoke test sdist
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapidobj-sdist
          path: dist/*.tar.gz

  wheels:
    runs-on: ${{ matrix.os }}
    needs:
      - release-version-check
      - typecheck
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v3.2.1
        with:
          output-dir: wheelhouse

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install twine
        run: python -m pip install twine

      - name: Check wheel metadata
        shell: bash
        run: python -m twine check wheelhouse/*.whl

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rapidobj-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - release-version-check
      - sdist
      - wheels
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/rapidobj
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: rapidobj-sdist
          path: dist

      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rapidobj-wheels-*
          merge-multiple: true
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
